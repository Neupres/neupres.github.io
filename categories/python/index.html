<script>
    let flag = true,swiper = null;
    //初始化swiper
    initSwiper();
    //监听浏览器窗口变化
    $(window).resize(function(){
        if(flag){
            flag = false;
            setTimeout(function(){
                initSwiper();
                flag = true;
            },600)
        }
    })
    function initSwiper(){
        if(swiper){
            swiper.destroy(true,true);
            swiper = null;
        }
        if($(window).width()<=750){
            swiper = new Swiper('.swiper-container', {
                slidesPerView: 'auto'
                , slideToClickedSlide: true
                , resistanceRatio: .5
            })
            swiper.on('click',function(e){
                if(e.clickedIndex == 1){
                    swiper.slideTo(0);
                }
            })
        }
    }
</script>
